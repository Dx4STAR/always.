<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26.12.2025 | For Vaiga</title>
    <style>
        :root {
            --space-black: #020617;
            --star-gold: #fff5d6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--space-black);
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
            touch-action: none; /* Prevents scrolling on mobile while drawing */
        }

        /* Entry Screen Overlay */
        #entry-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 3.5rem; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 200; letter-spacing: 6px; margin: 0 0 15px 0; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        #start-btn {
            background: none; border: 1px solid var(--star-gold);
            color: var(--star-gold); padding: 14px 45px;
            font-size: 0.8rem; cursor: pointer;
            letter-spacing: 5px; transition: all 0.4s ease;
            text-transform: uppercase;
        }

        #start-btn:hover {
            background: var(--star-gold); color: #000;
            box-shadow: 0 0 40px rgba(255, 245, 214, 0.4);
        }

        /* Main Sky Layout */
        #sky-container { position: relative; width: 100vw; height: 100vh; visibility: hidden; }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        .moon {
            position: absolute; top: 15%; left: 50%;
            transform: translateX(-50%);
            width: 100px; height: 100px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 40px 5px rgba(255, 255, 255, 0.1);
            z-index: 1; transition: 4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #message-container {
            position: absolute; bottom: 12%; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 10;
        }

        #final-message {
            font-size: 1.2rem; letter-spacing: 8px;
            opacity: 0; transition: 3s; color: white;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        #signature {
            font-size: 0.9rem; letter-spacing: 4px;
            opacity: 0; transition: 4s; color: var(--star-gold);
            font-style: italic;
        }

        #hint {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); font-size: 0.7rem; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <div class="glass-card">
            <h2>26.12.2025</h2>
            <p>The night the universe changed.</p>
            <button id="start-btn">REWIND</button>
        </div>
    </div>

    <div id="sky-container">
        <div id="hint">Connect the stars to form her heart...</div>
        <canvas id="starCanvas"></canvas>
        <div class="moon" id="mainMoon"></div>

        <div id="message-container">
            <div id="final-message">I LOVE YOU TO THE MOON AND BACK</div>
            <div id="signature">Vaiga Raj, Always</div>
        </div>
    </div>

    <script>
        const entryScreen = document.getElementById('entry-screen');
        const startBtn = document.getElementById('start-btn');
        const skyContainer = document.getElementById('sky-container');
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        
        let stars = [];
        let pointsToConnect = [];
        let experienceStarted = false;

        // Start function
        startBtn.addEventListener('click', () => {
            entryScreen.style.opacity = '0';
            entryScreen.style.visibility = 'hidden';
            skyContainer.style.visibility = 'visible';
            experienceStarted = true;
            // Remove from DOM after transition
            setTimeout(() => { entryScreen.remove(); }, 1000);
        });

        function init() {
            resize();
            createBackgroundStars();
            createVConstellation();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(experienceStarted) createVConstellation(); 
        }

        function createBackgroundStars() {
            stars = [];
            for (let i = 0; i < 350; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.3,
                    opacity: Math.random(),
                    vel: 0.005 + Math.random() * 0.01
                });
            }
        }

        function createVConstellation() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 + 20; 
            
            pointsToConnect = [
                {x: cx - 80, y: cy - 100, reached: false},
                {x: cx - 55, y: cy - 40, reached: false},
                {x: cx - 30, y: cy + 20, reached: false},
                {x: cx,      y: cy + 80, reached: false}, // Tip of V
                {x: cx + 30, y: cy + 20, reached: false},
                {x: cx + 55, y: cy - 40, reached: false},
                {x: cx + 80, y: cy - 100, reached: false}
            ];
        }

        function draw() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw twinkle stars
            stars.forEach(s => {
                s.opacity += s.vel;
                if(s.opacity > 1 || s.opacity < 0.2) s.vel *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });

            if(!experienceStarted) return;

            // Draw V Lines
            ctx.beginPath();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "white";
            
            let startedPath = false;
            pointsToConnect.forEach((p) => {
                if(p.reached) {
                    if(!startedPath) { ctx.moveTo(p.x, p.y); startedPath = true; }
                    else { ctx.lineTo(p.x, p.y); }
                }
            });
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Draw V Nodes
            pointsToConnect.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.reached ? 4 : 2, 0, Math.PI*2);
                ctx.fillStyle = p.reached ? "#fff" : "rgba(255,255,255,0.2)";
                if(p.reached) { ctx.shadowBlur = 15; ctx.shadowColor = "white"; }
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            if(!experienceStarted) return;
            const x = (e.clientX || (e.touches && e.touches[0].clientX));
            const y = (e.clientY || (e.touches && e.touches[0].clientY));

            pointsToConnect.forEach((p, index) => {
                const dist = Math.hypot(p.x - x, p.y - y);
                // "Magnet" effect: 45px range
                if (dist < 45) {
                    if (index === 0 || pointsToConnect[index-1].reached) {
                        p.reached = true;
                    }
                }
            });

            if(pointsToConnect.every(p => p.reached)) {
                document.getElementById('final-message').style.opacity = '1';
                setTimeout(() => { document.getElementById('signature').style.opacity = '1'; }, 1200);
                document.getElementById('hint').style.opacity = '0';
                const moon = document.getElementById('mainMoon');
                moon.style.boxShadow = '0 0 120px 40px rgba(255,255,255,0.3)';
                moon.style.transform = 'translateX(-50%) scale(1.3)';
            }
        }

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput);
        window.addEventListener('resize', resize);
        
        init();
    </script>
</body>
</html>
